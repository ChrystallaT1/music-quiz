<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script>
      // Runs immediately — saves the OAuth code to sessionStorage before
      // Live Server's hot-reload script can trigger a page reload and strip it
      (function () {
        var code = new URLSearchParams(window.location.search).get("code");
        if (code) {
          sessionStorage.setItem("spotify_oauth_code", code);
          window.history.replaceState({}, "", window.location.pathname);
        }
      })();
    </script>
    <main id="app">
      <section class="screen" data-screen="landing" hidden></section>
      <section class="screen" data-screen="modeSelect" hidden></section>
      <section class="screen" data-screen="pickArtistOrGenre" hidden></section>
      <section class="screen" data-screen="gameSettings" hidden></section>
      <section class="screen" data-screen="play" hidden></section>
      <section class="screen" data-screen="results" hidden></section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
